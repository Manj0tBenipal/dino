<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DinoRun">
  <link rel="manifest" href="manifest.json">
  <title>DinoRun</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>DINO<span>RUN</span></h1>
      <p class="subtitle">human vs machine</p>
    </header>

    <div class="scoreboard">
      <div class="score-card human">
        <span class="score-label">YOU</span>
        <span class="score-value" id="human-score">00000</span>
      </div>
      <div class="score-card hi">
        <span class="score-label">BEST</span>
        <span class="score-value" id="hi-score">00000</span>
      </div>
      <div class="score-card ai">
        <span class="score-label">AI</span>
        <span class="score-value" id="ai-score">00000</span>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="canvas"></canvas>
      <div class="scanline"></div>

      <!-- mobile warning overlay -->
      <div id="death-warning" class="death-warning hidden">YOU DIED</div>
    </div>

    <!-- mobile touch controls -->
    <div class="touch-controls">
      <button class="touch-btn" id="btn-jump" ontouchstart="onJumpPress()" ontouchend="onJumpRelease()">
        <span>▲</span><small>JUMP</small>
      </button>
      <button class="touch-btn" id="btn-duck" ontouchstart="onDuckPress()" ontouchend="onDuckRelease()">
        <span>▼</span><small>DUCK</small>
      </button>
    </div>

    <div class="controls desktop-only">
      <span class="key">SPACE</span> jump &nbsp;·&nbsp;
      <span class="key">↓</span> duck
    </div>

    <div class="ai-log-wrapper">
      <div class="ai-log-header">
        <span class="ai-dot"></span> AI LOG
      </div>
      <div id="ai-log" class="ai-log"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
